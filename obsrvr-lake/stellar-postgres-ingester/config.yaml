service:
  name: stellar-postgres-ingester
  health_port: 8088
  grpc_port: 50054  # flowctl SourceService port (0 = disabled)

source:
  endpoint: "localhost:50053"
  network_passphrase: "Test SDF Network ; September 2015"
  start_ledger: 1000000
  end_ledger: 1001000
