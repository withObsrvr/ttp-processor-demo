postgres:
  host: localhost
  port: 5434
  database: stellar_hot
  user: stellar
  password: stellar_dev_password
  sslmode: disable
  batch_size: 50
  commit_interval_seconds: 5

checkpoint:
  file_path: checkpoint.json
