# Account Index Transformer Configuration

service:
  name: "account-index-transformer"
  version: "1.0.0"
  poll_interval_seconds: 30
  batch_size: 10000
  allow_retention_gap_start: false

bronze_source:
  mode: "poll"
  endpoint: ""

silver_hot:
  host: "${PG_SILVER_HOT_HOST}"
  port: 25060
  database: "silver_hot"
  user: "${PG_SILVER_HOT_USER}"
  password: "${PG_SILVER_HOT_PASSWORD}"
  sslmode: "require"

silver_cold:
  catalog_name: "testnet_catalog"
  schema_name: "silver"
  metadata_schema: "silver_meta"
  duckdb_path: "/tmp/duckdb/account_index_silver_reader.db"
  catalog_host: "${CATALOG_HOST}"
  catalog_port: 25060
  catalog_database: "${CATALOG_DB}"
  catalog_user: "${CATALOG_USER}"
  catalog_password: "${CATALOG_PASSWORD}"
  catalog_sslmode: "require"
  s3_endpoint: "s3.us-west-004.backblazeb2.com"
  s3_region: "us-west-004"
  s3_access_key_id: "${B2_KEY_ID}"
  s3_secret_access_key: "${B2_KEY_SECRET}"
  s3_bucket: "${B2_INDEX_BUCKET}"
  data_path: "s3://${B2_INDEX_BUCKET}/"

catalog:
  host: "${CATALOG_HOST}"
  port: 25060
  database: "${CATALOG_DB}"
  user: "${CATALOG_USER}"
  password: "${CATALOG_PASSWORD}"
  sslmode: "require"

index_cold:
  catalog_name: "testnet_catalog"
  schema_name: "index"
  table_name: "account_ledger_index"
  duckdb_path: "/tmp/duckdb/account_index_writer.db"
  catalog_host: "${CATALOG_HOST}"
  catalog_port: 25060
  catalog_database: "${CATALOG_DB}"
  catalog_user: "${CATALOG_USER}"
  catalog_password: "${CATALOG_PASSWORD}"
  catalog_sslmode: "require"
  s3_endpoint: "s3.us-west-004.backblazeb2.com"
  s3_region: "us-west-004"
  s3_access_key_id: "${B2_KEY_ID}"
  s3_secret_access_key: "${B2_KEY_SECRET}"
  s3_bucket: "${B2_INDEX_BUCKET}"
  # Must match query-api ACCOUNT_LEDGER_INDEX_PARTITION_SIZE.
  # Changing this requires a full account_ledger_index rebuild.
  partition_size: 100000

account_index:
  # Changing account_bucket_count requires a full account_ledger_index rebuild.
  account_bucket_count: 256

index_postgres:
  # Dark mirror for the Postgres index-plane relocation. DuckLake remains
  # authoritative until query-api has a Postgres reader and parity checks pass.
  enabled: false
  # mirror = log failures without blocking DuckLake; primary = fail the cycle.
  mode: "mirror"
  schema: "index"
  table: "account_ledger_index"
  checkpoint_table: "index.account_ledger_postgres_checkpoint"

serving_feed:
  # Dark incremental sink for serving.sv_transactions_by_account and
  # serving.sv_operations_by_account. Enable after the cold backfill has created
  # complete watermarks for the serving feed tables.
  enabled: false
  schema: "serving"
  transactions_table: "sv_transactions_by_account"
  operations_table: "sv_operations_by_account"
  watermark_table: "serving.sv_watermarks"
  consumer_table: "ops.consumers"
  pipeline: "account-index-transformer.account-feed"

checkpoint:
  table: "index.account_ledger_transformer_checkpoint"

backfill_checkpoint:
  table: "index.account_ledger_backfill_checkpoint"

health:
  port: 8096

maintenance:
  enabled: true
  every_n_writes: 100
  max_compacted_files: 200
