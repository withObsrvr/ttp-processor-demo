host: gateway.withobsrvr.com
info:
  contact:
    email: support@obsrvr.com
    name: OBSRVR Team
    url: https://obsrvr.com
  description: |-
    API for querying Stellar blockchain data across Bronze, Silver, Semantic, and Gold data layers.

    ## Data Layers
    - **Bronze**: Raw blockchain data (ledgers, transactions, operations, effects)
    - **Silver**: Enriched and processed data (accounts, assets, transfers, trades)
    - **Semantic**: Meaning-oriented views (activities, contracts, value flows)
    - **Gold**: Analytical views (snapshots, compliance reports)
    - **Index Plane**: Fast lookup services (transaction hash, contract events)

    ## Amount Formatting
    All amounts are returned in decimal format with 7 decimal places (Stellar stroops conversion).
    Example: Raw stroops `10000000` is formatted as `"1.0000000"`
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: Stellar Query API
  version: "1.0"
paths:
  /api/v1/bronze/accounts:
    get:
      consumes:
      - application/json
      description: Returns raw account snapshots from hot and cold storage for a given
        account ID
      parameters:
      - description: Stellar account ID (G...)
        in: query
        name: account_id
        required: true
        type: string
      - description: Maximum results to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Account data
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Get raw account data
      tags:
      - Bronze
  /api/v1/bronze/contract_events:
    get:
      consumes:
      - application/json
      description: Returns raw Soroban contract event data from hot and cold storage
        for a given ledger sequence range
      parameters:
      - description: Start ledger sequence
        in: query
        name: start
        required: true
        type: integer
      - description: End ledger sequence
        in: query
        name: end
        required: true
        type: integer
      - description: Maximum results to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Contract event data
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Get raw contract events
      tags:
      - Bronze
  /api/v1/bronze/effects:
    get:
      consumes:
      - application/json
      description: Returns raw effect data from hot and cold storage for a given ledger
        sequence range
      parameters:
      - description: Start ledger sequence
        in: query
        name: start
        required: true
        type: integer
      - description: End ledger sequence
        in: query
        name: end
        required: true
        type: integer
      - description: Maximum results to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Effect data
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Get raw effects
      tags:
      - Bronze
  /api/v1/bronze/ledgers:
    get:
      consumes:
      - application/json
      description: Returns raw ledger data from hot and cold storage for a given sequence
        range
      parameters:
      - description: Start ledger sequence
        in: query
        name: start
        required: true
        type: integer
      - description: End ledger sequence
        in: query
        name: end
        required: true
        type: integer
      - description: Maximum results to return
        in: query
        name: limit
        type: integer
      - description: 'Sort order: sequence_asc (default), sequence_desc, closed_at_asc,
          closed_at_desc, tx_count_desc'
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Ledger data with source info
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Get raw ledgers
      tags:
      - Bronze
  /api/v1/bronze/offers:
    get:
