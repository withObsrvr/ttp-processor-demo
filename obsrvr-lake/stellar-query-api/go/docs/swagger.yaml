        name: timestamp
        required: true
        type: string
      - description: Minimum balance filter (in stroops)
        in: query
        name: min_balance
        type: string
      - description: 'Maximum results to return (default: 1000, max: 10000)'
        in: query
        name: limit
        type: integer
      - description: 'Output format: json (default), csv, parquet'
        in: query
        name: format
        type: string
      produces:
